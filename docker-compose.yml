services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: myshop_root
      MYSQL_DATABASE: myshop
      MYSQL_USER: myshop
      MYSQL_PASSWORD: myshop_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    environment:
      PORT: 4000
      JWT_SECRET: myshop-compose-secret
    ports:
      - "4000:4000"
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
